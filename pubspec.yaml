name: kids_math_app
description: Kids Math Learning App for children aged 5-7
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Network
  dio: ^5.4.0

  # Local storage
  flutter_secure_storage: ^9.0.0   # JWT token
  shared_preferences: ^2.2.0       # SkillMap cache, settings

  # Audio & TTS
  audioplayers: ^6.0.0
  flutter_tts: ^4.0.0

  # Animation
  lottie: ^3.1.0

  # Charts (Skill Map radar chart)
  fl_chart: ^0.68.0

  # Utilities
  freezed_annotation: ^2.4.0
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/avatars/
    - assets/images/badges/
    - assets/images/backgrounds/
    - assets/audio/
    - assets/animations/
